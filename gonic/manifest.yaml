manifestVersion: 1
name: "@magistr/gonic"
version: "2026.07.16.2"
description: |
  Gonic Subsonic-compatible music server API for swamp — browse, search,
  stream, and scrobble against the Subsonic REST API, manage podcasts, and
  drive library scans.

  Model:
  - `@magistr/gonic` — connectivity ping plus podcast management (list,
    refresh, delete channel/episode, trigger download), library scan status
    and rescan, and playlist listing over the Subsonic REST API. Also offers
    direct SQLite maintenance helpers over SSH (read-only query, write exec,
    and ensure-podcast-dirs) for the underlying `gonic.db`.

  The Subsonic password is marked sensitive so it is never persisted in
  cleartext; database access uses non-interactive SSH (BatchMode) so it never
  blocks on a prompt.

repository: "https://github.com/umag/swamp-workspace"
paths:
  base: manifest

models:
  - extensions/models/gonic.ts

additionalFiles:
  - README.md
  - LICENSE.md

platforms: []

labels:
  - music
  - subsonic
  - gonic
  - self-hosted
