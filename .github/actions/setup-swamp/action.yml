name: Setup swamp
description: >
  Download a pinned swamp release and add it to $PATH. Used by the
  extension-publish job in CI.

inputs:
  version:
    description: >
      swamp release to install: "latest" (default) or a specific release tag
      WITHOUT the leading "v" (e.g. "20260524.205501.0-sha.bfea476b").
    required: false
    default: "latest"

runs:
  using: composite
  steps:
    - name: Download swamp (${{ inputs.version }})
      shell: bash
      run: |
        set -eo pipefail
        version="${{ inputs.version }}"
        # systeminit/swamp ships raw per-platform binaries (no tarball):
        #   swamp-linux-x86_64, swamp-darwin-aarch64, swamp-windows-x86_64.exe …
        if [ "$version" = "latest" ]; then
          url="https://github.com/systeminit/swamp/releases/latest/download/swamp-linux-x86_64"
        else
          url="https://github.com/systeminit/swamp/releases/download/v${version}/swamp-linux-x86_64"
        fi
        echo "Downloading swamp (${version}) from ${url}"
        mkdir -p "${RUNNER_TEMP}/swamp-bin"
        curl -fsSL "$url" -o "${RUNNER_TEMP}/swamp-bin/swamp"
        chmod +x "${RUNNER_TEMP}/swamp-bin/swamp"
        echo "${RUNNER_TEMP}/swamp-bin" >> "$GITHUB_PATH"
        "${RUNNER_TEMP}/swamp-bin/swamp" --version
