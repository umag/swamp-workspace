name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deno-check:
    name: deno (fmt, lint, check, test)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extension:
          - issue-lifecycle
          - good-planning
          - libvirt
          - pihole
          - telegram-send
          - porkbun
          - tubearchivist
          - obsidian-vault
          - obsidian-yt-archiver
          - talos-node
          - talm-cluster
          - cozystack-platform
          - cozystack-linstor
          - jscad-cad
          - juick
          - fidonet-msgbase
          - jabber
          - skype
          - livejournal-import
          - telegram-import
    steps:
      - uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.13

      - name: Format check
        working-directory: ${{ matrix.extension }}
        run: deno task fmt:check

      - name: Lint
        working-directory: ${{ matrix.extension }}
        run: deno task lint

      - name: Type check
        working-directory: ${{ matrix.extension }}
        run: deno task check

      - name: Test
        working-directory: ${{ matrix.extension }}
        run: deno task test

      - name: Check model version matches manifest
        working-directory: ${{ matrix.extension }}
        run: |
          set -eo pipefail
          manifest_ver=$(grep -m1 '^version:' manifest.yaml \
            | sed -E 's/^version:[[:space:]]*"?([^"]+)"?.*/\1/')
          if [ -z "$manifest_ver" ]; then
            echo "::error::could not read version from manifest.yaml"; exit 1
          fi
          rc=0
          for f in extensions/models/*.ts; do
            case "$f" in *_test.ts | *.test.ts) continue ;; esac
            # Each model object's `version: "<calver>"` field must equal the
            # manifest version, so the published model type version and the
            # package version never drift (swamp warns when they do).
            while IFS= read -r mv; do
              if [ "$mv" != "$manifest_ver" ]; then
                echo "::error file=${{ matrix.extension }}/$f::model version \"$mv\" != manifest \"$manifest_ver\""
                rc=1
              fi
            done < <(grep -oE '^[[:space:]]*version:[[:space:]]*"[0-9][^"]*"' "$f" \
              | grep -oE '"[0-9][^"]*"' | tr -d '"')
          done
          exit $rc

      - name: Format check (scripts)
        working-directory: scripts
        run: deno fmt --check

      - name: Lint (scripts)
        working-directory: scripts
        run: deno lint

      - name: Type check (scripts)
        working-directory: scripts
        run: deno check build-promptfoo-tests.ts build-ci-report.ts

  skill-review:
    name: skill-review (tessl)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - extension: issue-lifecycle
            skill: issue-lifecycle
          - extension: issue-lifecycle
            skill: ddd
          - extension: issue-lifecycle
            skill: tdd
          - extension: issue-lifecycle
            skill: moldable-dev
          - extension: issue-lifecycle
            skill: review-code
          - extension: issue-lifecycle
            skill: review-adversarial
          - extension: issue-lifecycle
            skill: review-security
          - extension: issue-lifecycle
            skill: review-ux
          - extension: issue-lifecycle
            skill: review-skill
          - extension: good-planning
            skill: good-planning
          - extension: jscad-cad
            skill: jscad-codegen
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Review ${{ matrix.skill }} with tessl
        env:
          # tessl authenticates from the TESSL_TOKEN env var (an API key minted
          # via `tessl api-key create`); the repo secret is named TESSL_API_KEY.
          TESSL_TOKEN: ${{ secrets.TESSL_API_KEY }}
        run: |
          set -eo pipefail
          # `--threshold 90` makes tessl exit non-zero when the skill scores
          # below 90% (native gating; replaces the old hand-rolled JSON parser,
          # whose score keys no longer match tessl's output schema). `--json` is
          # piped to a file for the uploaded report; pipefail propagates the
          # tessl exit code through `tee`.
          npx --yes tessl@0.80.0 skill review \
            "${{ matrix.extension }}/.claude/skills/${{ matrix.skill }}" \
            --threshold 90 --json | tee "tessl-${{ matrix.skill }}.json"

      - name: Upload tessl report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tessl-${{ matrix.skill }}
          path: tessl-${{ matrix.skill }}.json

  skill-trigger-eval:
    name: skill-trigger-eval (promptfoo, sonnet)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.13

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Build promptfoo tests from per-skill JSONs
        run: deno run --allow-read --allow-write scripts/build-promptfoo-tests.ts

      - name: Run promptfoo eval (sonnet only)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -eo pipefail
          # promptfoo exits 100 when ANY test assertion fails. That is expected
          # here — the node check below is the real gate (>=90% trigger pass
          # rate), and promptfoo still writes the --output JSON on a 100 exit.
          # Any OTHER non-zero exit is a genuine error and must fail the step.
          ec=0
          npx --yes promptfoo@0.121.12 eval \
            -c promptfoo.generated.yaml \
            --output promptfoo-results.json || ec=$?
          if [ "$ec" -ne 0 ] && [ "$ec" -ne 100 ]; then
            echo "::error::promptfoo eval errored (exit $ec)"; exit "$ec"
          fi

          node -e "
            const r = require('./promptfoo-results.json');
            const total = r.results?.stats?.total
              ?? (r.results?.results?.length ?? 0);
            const passes = r.results?.stats?.successes
              ?? (r.results?.results || []).filter((x) => x.success).length;
            if (total === 0) {
              console.error('no results');
              process.exit(1);
            }
            const rate = passes / total;
            console.log('promptfoo pass rate: ' + passes + '/' + total + ' = ' + (rate * 100).toFixed(1) + '%');
            if (rate < 0.90) {
              console.error('FAIL: pass rate < 90%');
              process.exit(1);
            }
          "

      - name: Upload promptfoo report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: promptfoo-results
          path: |
            promptfoo.generated.yaml
            promptfoo-results.json

  pr-report:
    name: pr-report (sticky comment)
    runs-on: ubuntu-latest
    needs: [skill-review, skill-trigger-eval]
    # Always run on PRs so the reports post even when a gate fails.
    if: always() && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.13

      - name: Download all gate artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Build full reports
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          deno run --allow-read --allow-write --allow-env \
            scripts/build-ci-report.ts artifacts

      - name: Upsert sticky PR comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -eo pipefail
          upsert() {
            local marker="$1" file="$2" id
            # Find an existing comment carrying this marker; edit it in place,
            # else create a new one. Keeps one sticky comment per report.
            id=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments?per_page=100" \
              --jq "map(select(.body | contains(\"$marker\"))) | .[0].id // empty")
            if [ -n "$id" ]; then
              gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${id}" \
                -F body=@"$file" >/dev/null
              echo "updated comment $id ($marker)"
            else
              gh pr comment "$PR" --body-file "$file"
            fi
          }
          upsert "ci-report:tessl" tessl-report.md
          upsert "ci-report:promptfoo" promptfoo-report.md

  extension-publish:
    name: extension-publish (on manifest version bump)
    runs-on: ubuntu-latest
    needs: deno-check
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect manifest version changes
        id: manifest-changed
        run: |
          set -eo pipefail
          changed=$(git diff --name-only HEAD~1 HEAD -- '*/manifest.yaml' || true)
          if [ -z "$changed" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No manifest changes in this push."
            exit 0
          fi
          version_diff=$(git diff HEAD~1 HEAD -- $changed | grep -E '^\+version:' || true)
          if [ -z "$version_diff" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Manifest touched but version line unchanged."
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "Changed manifests: $changed"
          echo "manifests<<EOF" >> "$GITHUB_OUTPUT"
          echo "$changed" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Setup swamp
        if: steps.manifest-changed.outputs.changed == 'true'
        uses: ./.github/actions/setup-swamp

      - name: Authenticate swamp
        if: steps.manifest-changed.outputs.changed == 'true'
        env:
          SWAMP_API_KEY: ${{ secrets.SWAMP_API_KEY }}
          SWAMP_API_KEY_ID: ${{ secrets.SWAMP_API_KEY_ID }}
        run: |
          set -eo pipefail
          if [ -z "$SWAMP_API_KEY" ]; then
            echo "::error::SWAMP_API_KEY secret is not set" >&2
            exit 1
          fi
          # swamp reads credentials from ~/.config/swamp/auth.json; it does NOT
          # honour any token env var. Build that file from the API-key secrets
          # (jq escapes the values safely).
          mkdir -p "$HOME/.config/swamp"
          jq -n \
            --arg key "$SWAMP_API_KEY" \
            --arg id "$SWAMP_API_KEY_ID" \
            '{
               serverUrl: "https://swamp-club.com",
               apiKey: $key,
               apiKeyId: $id,
               username: "magistr",
               collectives: ["bad-at-naming", "magistr"]
             }' > "$HOME/.config/swamp/auth.json"
          chmod 600 "$HOME/.config/swamp/auth.json"
          swamp auth whoami

      - name: Publish changed extensions
        if: steps.manifest-changed.outputs.changed == 'true'
        run: |
          set -eo pipefail
          # Per-version release notes are immutable on the swamp registry —
          # if we don't pass --release-notes, the swamp.club changelog
          # entry is empty for that version forever. Default to the commit
          # message of HEAD (the commit that bumped the version), capped
          # to the CLI's 5000-char limit.
          notes="$(git log -1 --format=%B HEAD | head -c 4900)"
          if [ -z "$notes" ]; then
            notes="Release of $(git rev-parse --short HEAD)"
          fi
          while IFS= read -r manifest; do
            [ -z "$manifest" ] && continue
            echo "Publishing $manifest"
            # -y is REQUIRED in CI: without it `extension push` prompts
            # "Push … to registry? [y/N]" and, with no TTY, defaults to No and
            # silently cancels (exit 0 → false-green). -y also accepts the
            # Deno.Command safety warning prompt.
            ( cd "$(dirname "$manifest")" \
                && swamp extension push manifest.yaml -y \
                     --release-notes "$notes" )
          done <<< "${{ steps.manifest-changed.outputs.manifests }}"
