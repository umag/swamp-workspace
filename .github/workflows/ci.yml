name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    name: discover extensions + skills
    runs-on: ubuntu-latest
    outputs:
      extensions: ${{ steps.scan.outputs.extensions }}
      skills: ${{ steps.scan.outputs.skills }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Need history back to the diff base so we can scope the matrix to
          # just the extensions this change touches.
          fetch-depth: 0
      - id: scan
        env:
          EVENT: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          set -eo pipefail
          # Auto-discovery: no hand-maintained matrix lists. Every top-level
          # directory containing a manifest.yaml is treated as an extension.
          all_exts=$(for m in */manifest.yaml; do [ -f "$m" ] && dirname "$m"; done | sort -u)

          # --- Diff base: only test/review what this change actually touched. ---
          # PR   → net changes vs the base branch (base.sha → merge HEAD).
          # push → prior tip → HEAD (HEAD~1 fallback when `before` is absent).
          # Any failure to compute a diff degrades to the FULL matrix (safe).
          zero="0000000000000000000000000000000000000000"
          if [ "$EVENT" = "pull_request" ]; then
            changed=$(git diff --name-only "$PR_BASE_SHA" HEAD 2>/dev/null || true)
            reason="PR vs base ${PR_BASE_SHA:0:12}"
          elif [ "$EVENT" = "push" ] && [ -n "$PUSH_BEFORE" ] && [ "$PUSH_BEFORE" != "$zero" ] \
               && git cat-file -e "${PUSH_BEFORE}^{commit}" 2>/dev/null; then
            changed=$(git diff --name-only "$PUSH_BEFORE" HEAD 2>/dev/null || true)
            reason="push ${PUSH_BEFORE:0:12}..HEAD"
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            changed=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
            reason="push HEAD~1..HEAD"
          else
            changed=""
            reason="no diff base"
          fi

          # --- Map changed files → touched extension dirs; flag global changes. ---
          # A changed file OUTSIDE every extension dir (.github/, scripts/, root
          # config, …) forces the FULL matrix — shared infra can affect any
          # extension. An empty/failed diff also forces full (fail safe).
          global=false
          touched=""
          if [ -z "$changed" ]; then
            global=true
          else
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              top=${f%%/*}
              if printf '%s\n' "$all_exts" | grep -qxF "$top"; then
                touched="${touched}${top}"$'\n'
              else
                global=true
              fi
            done <<< "$changed"
          fi

          if [ "$global" = "true" ]; then
            selected=$all_exts
            echo "Scope: FULL — $reason (shared/global file changed or no diff)"
          else
            selected=$(printf '%s\n' "$touched" | sed '/^$/d' | sort -u)
            echo "Scope: SCOPED — $reason"
          fi
          echo "Selected extensions:"; printf '  %s\n' $selected

          # --- Extension matrix (JSON array of dir names). ---
          exts=$(printf '%s\n' "$selected" | sed '/^$/d' | jq -R . | jq -cs .)
          echo "extensions=$exts" >> "$GITHUB_OUTPUT"
          echo "Extensions: $exts"

          # --- Skill matrix, filtered to the selected extensions. Every
          # <ext>/.claude/skills/<skill>/SKILL.md is a tessl-reviewable skill
          # (emitted as {extension, skill} pairs). ---
          skills=$(for s in */.claude/skills/*/SKILL.md; do
              [ -f "$s" ] || continue
              ext=${s%%/*}
              printf '%s\n' "$selected" | grep -qxF "$ext" || continue
              skill=$(basename "$(dirname "$s")")
              jq -nc --arg e "$ext" --arg k "$skill" '{extension:$e,skill:$k}'
            done | jq -cs .)
          echo "skills=$skills" >> "$GITHUB_OUTPUT"
          echo "Skills: $skills"

  deno-check:
    name: deno (fmt, lint, check, test)
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extension: ${{ fromJson(needs.discover.outputs.extensions) }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.3

      - name: Format check
        working-directory: ${{ matrix.extension }}
        run: deno task fmt:check

      - name: Lint
        working-directory: ${{ matrix.extension }}
        run: deno task lint

      - name: Type check
        working-directory: ${{ matrix.extension }}
        run: deno task check

      - name: Test
        working-directory: ${{ matrix.extension }}
        run: deno task test

      - name: Check model version matches manifest
        working-directory: ${{ matrix.extension }}
        run: |
          set -eo pipefail
          manifest_ver=$(grep -m1 '^version:' manifest.yaml \
            | sed -E 's/^version:[[:space:]]*"?([^"]+)"?.*/\1/')
          if [ -z "$manifest_ver" ]; then
            echo "::error::could not read version from manifest.yaml"; exit 1
          fi
          rc=0
          for f in extensions/models/*.ts; do
            case "$f" in *_test.ts | *.test.ts) continue ;; esac
            # Each model object's `version: "<calver>"` field must equal the
            # manifest version, so the published model type version and the
            # package version never drift (swamp warns when they do).
            while IFS= read -r mv; do
              if [ "$mv" != "$manifest_ver" ]; then
                echo "::error file=${{ matrix.extension }}/$f::model version \"$mv\" != manifest \"$manifest_ver\""
                rc=1
              fi
            done < <(grep -oE '^[[:space:]]*version:[[:space:]]*"[0-9][^"]*"' "$f" \
              | grep -oE '"[0-9][^"]*"' | tr -d '"')
          done
          exit $rc

      - name: Format check (scripts)
        working-directory: scripts
        run: deno fmt --check

      - name: Lint (scripts)
        working-directory: scripts
        run: deno lint

      - name: Type check (scripts)
        working-directory: scripts
        run: deno check build-promptfoo-tests.ts build-ci-report.ts

  skill-review:
    name: skill-review (tessl)
    needs: discover
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        pair: ${{ fromJson(needs.discover.outputs.skills) }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Review ${{ matrix.pair.skill }} with tessl
        env:
          # tessl authenticates from the TESSL_TOKEN env var (an API key minted
          # via `tessl api-key create`); the repo secret is named TESSL_API_KEY.
          TESSL_TOKEN: ${{ secrets.TESSL_API_KEY }}
        run: |
          set -eo pipefail
          # `--threshold 90` makes tessl exit non-zero when the skill scores
          # below 90% (native gating; replaces the old hand-rolled JSON parser,
          # whose score keys no longer match tessl's output schema). `--json` is
          # piped to a file for the uploaded report; pipefail propagates the
          # tessl exit code through `tee`.
          npx --yes tessl@0.80.0 skill review \
            "${{ matrix.pair.extension }}/.claude/skills/${{ matrix.pair.skill }}" \
            --threshold 90 --json | tee "tessl-${{ matrix.pair.skill }}.json"

      - name: Upload tessl report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tessl-${{ matrix.pair.skill }}
          path: tessl-${{ matrix.pair.skill }}.json

  skill-trigger-eval:
    name: skill-trigger-eval (promptfoo, sonnet)
    runs-on: ubuntu-latest
    needs: discover
    # Skip when no in-scope skill changed. Trigger-collision eval is inherently
    # cross-skill, so when it DOES run it still evaluates every skill's triggers.
    if: github.event_name == 'pull_request' && needs.discover.outputs.skills != '[]'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Build promptfoo tests from per-skill JSONs
        run: deno run --allow-read --allow-write scripts/build-promptfoo-tests.ts

      - name: Run promptfoo eval (sonnet only)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -eo pipefail
          # promptfoo exits 100 when ANY test assertion fails. That is expected
          # here — the node check below is the real gate (>=90% trigger pass
          # rate), and promptfoo still writes the --output JSON on a 100 exit.
          # Any OTHER non-zero exit is a genuine error and must fail the step.
          ec=0
          npx --yes promptfoo@0.121.12 eval \
            -c promptfoo.generated.yaml \
            --output promptfoo-results.json || ec=$?
          if [ "$ec" -ne 0 ] && [ "$ec" -ne 100 ]; then
            echo "::error::promptfoo eval errored (exit $ec)"; exit "$ec"
          fi

          node -e "
            const r = require('./promptfoo-results.json');
            const total = r.results?.stats?.total
              ?? (r.results?.results?.length ?? 0);
            const passes = r.results?.stats?.successes
              ?? (r.results?.results || []).filter((x) => x.success).length;
            if (total === 0) {
              console.error('no results');
              process.exit(1);
            }
            const rate = passes / total;
            console.log('promptfoo pass rate: ' + passes + '/' + total + ' = ' + (rate * 100).toFixed(1) + '%');
            if (rate < 0.90) {
              console.error('FAIL: pass rate < 90%');
              process.exit(1);
            }
          "

      - name: Upload promptfoo report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: promptfoo-results
          path: |
            promptfoo.generated.yaml
            promptfoo-results.json

  pr-report:
    name: pr-report (sticky comment)
    runs-on: ubuntu-latest
    needs: [discover, skill-review, skill-trigger-eval]
    # Always run on PRs so the reports post even when a gate fails — but only
    # when an in-scope skill was reviewed (else there are no reports to post).
    if: always() && github.event_name == 'pull_request' && needs.discover.outputs.skills != '[]'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.3

      - name: Download all gate artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Build full reports
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          deno run --allow-read --allow-write --allow-env \
            scripts/build-ci-report.ts artifacts

      - name: Upsert sticky PR comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -eo pipefail
          upsert() {
            local marker="$1" file="$2" id
            # Find an existing comment carrying this marker; edit it in place,
            # else create a new one. Keeps one sticky comment per report.
            id=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments?per_page=100" \
              --jq "map(select(.body | contains(\"$marker\"))) | .[0].id // empty")
            if [ -n "$id" ]; then
              gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${id}" \
                -F body=@"$file" >/dev/null
              echo "updated comment $id ($marker)"
            else
              gh pr comment "$PR" --body-file "$file"
            fi
          }
          upsert "ci-report:tessl" tessl-report.md
          upsert "ci-report:promptfoo" promptfoo-report.md

  extension-publish:
    name: extension-publish (on manifest version bump)
    runs-on: ubuntu-latest
    needs: deno-check
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect manifest version changes
        id: manifest-changed
        run: |
          set -eo pipefail
          changed=$(git diff --name-only HEAD~1 HEAD -- '*/manifest.yaml' || true)
          if [ -z "$changed" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No manifest changes in this push."
            exit 0
          fi
          version_diff=$(git diff HEAD~1 HEAD -- $changed | grep -E '^\+version:' || true)
          if [ -z "$version_diff" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Manifest touched but version line unchanged."
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "Changed manifests: $changed"
          echo "manifests<<EOF" >> "$GITHUB_OUTPUT"
          echo "$changed" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Setup swamp
        if: steps.manifest-changed.outputs.changed == 'true'
        uses: ./.github/actions/setup-swamp

      - name: Authenticate swamp
        if: steps.manifest-changed.outputs.changed == 'true'
        env:
          SWAMP_API_KEY: ${{ secrets.SWAMP_API_KEY }}
          SWAMP_API_KEY_ID: ${{ secrets.SWAMP_API_KEY_ID }}
        run: |
          set -eo pipefail
          if [ -z "$SWAMP_API_KEY" ]; then
            echo "::error::SWAMP_API_KEY secret is not set" >&2
            exit 1
          fi
          # swamp reads credentials from ~/.config/swamp/auth.json; it does NOT
          # honour any token env var. Build that file from the API-key secrets
          # (jq escapes the values safely).
          mkdir -p "$HOME/.config/swamp"
          jq -n \
            --arg key "$SWAMP_API_KEY" \
            --arg id "$SWAMP_API_KEY_ID" \
            '{
               serverUrl: "https://swamp-club.com",
               apiKey: $key,
               apiKeyId: $id,
               username: "magistr",
               collectives: ["bad-at-naming", "magistr"]
             }' > "$HOME/.config/swamp/auth.json"
          chmod 600 "$HOME/.config/swamp/auth.json"
          swamp auth whoami

      - name: Publish changed extensions
        if: steps.manifest-changed.outputs.changed == 'true'
        run: |
          set -eo pipefail
          # Per-version release notes are immutable on the swamp registry — if we
          # don't pass --release-notes, the swamp.club entry for that version is
          # empty forever. Prefer the extension's OWN CHANGELOG.md section for the
          # version being published (so the registry notes match the repo
          # changelog); fall back to the version-bump commit message. (The README
          # ships automatically via each manifest's additionalFiles.)
          commit_notes="$(git log -1 --format=%B HEAD | head -c 4900)"
          [ -z "$commit_notes" ] && commit_notes="Release of $(git rev-parse --short HEAD)"
          while IFS= read -r manifest; do
            [ -z "$manifest" ] && continue
            dir="$(dirname "$manifest")"
            ver="$(grep -m1 '^version:' "$manifest" \
              | sed -E 's/^version:[[:space:]]*"?([^"]+)"?.*/\1/')"
            # Extract the `## <ver> …` section from the extension's CHANGELOG
            # (everything up to the next `## ` heading). The char-after-version
            # guard stops `…19.1` from also matching a `…19.10` heading.
            notes=""
            if [ -n "$ver" ] && [ -f "$dir/CHANGELOG.md" ]; then
              notes="$(awk -v v="$ver" '
                index($0, "## " v) == 1 && substr($0, length("## " v) + 1, 1) !~ /[0-9.]/ { f=1; print; next }
                f && /^## / { exit }
                f { print }
              ' "$dir/CHANGELOG.md" | head -c 4900)"
            fi
            [ -z "$notes" ] && notes="$commit_notes"
            # Per-extension release channel selector: an optional
            # `<ext>/.release-channel` file (contents: beta | rc | stable)
            # chooses the swamp registry channel. Absent → stable, so existing
            # extensions publish exactly as before.
            channel="stable"
            if [ -f "$dir/.release-channel" ]; then
              channel="$(tr -d '[:space:]' < "$dir/.release-channel")"
              case "$channel" in
                beta|rc|stable) ;;
                *) echo "::error::$dir/.release-channel must be beta|rc|stable (got '$channel')" >&2; exit 1 ;;
              esac
            fi
            echo "Publishing $manifest @ ${ver:-?} to '$channel' channel"
            # -y is REQUIRED in CI: without it `extension push` prompts
            # "Push … to registry? [y/N]" and, with no TTY, defaults to No and
            # silently cancels (exit 0 → false-green). -y also accepts the
            # Deno.Command safety warning prompt.
            # Single-root-repo layout: run push from the repo root with the full
            # manifest path. Each manifest sets `paths.base: manifest`, so its
            # `models:`/`reports:`/`additionalFiles:` resolve relative to the
            # manifest's own subdirectory.
            swamp extension push "$manifest" -y --channel "$channel" --release-notes "$notes"
          done <<< "${{ steps.manifest-changed.outputs.manifests }}"
