# Nightly property-test soak for @magistr/stripe-mpp.
#
# The committed suite runs each fast-check property at a tuned CI count
# (40–300 cases) so `deno task test` stays ~5s. This job re-runs the three
# property files at a MUCH higher count to shake out rare edge cases (the
# class of bug that only appears 1-in-thousands — e.g. the credential-tamper
# no-op, or `xn--0.aa` invalid-IDN host — that a low count hides).
#
# Scheduled (nightly) → FC_NUM_RUNS=1,000,000 per property (~28M generated
# cases, incl. ~6M full buyer↔seller flows) → a multi-hour deep soak. Manual
# `workflow_dispatch` defaults to 10000 for a quick check; override via the
# `runs` input.
#
# On failure fast-check prints the seed + shrunk counterexample; reproduce
# locally with `FC_NUM_RUNS=<n> deno task test:soak` (or pin the seed).
name: stripe-mpp property soak

on:
  schedule:
    - cron: "37 3 * * *" # nightly, 03:37 UTC
  workflow_dispatch:
    inputs:
      runs:
        description: "fast-check numRuns override (nightly uses 1000000)"
        required: false
        default: "10000"

permissions:
  contents: read

jobs:
  soak:
    runs-on: ubuntu-latest
    # A few-hour soak; stays under GitHub's 6h per-job hard cap.
    timeout-minutes: 350
    defaults:
      run:
        working-directory: stripe-mpp
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Type-check
        run: deno task check
      - name: Property soak (FC_NUM_RUNS)
        env:
          # Scheduled runs have no `runs` input → default to the multi-hour
          # 1,000,000-per-property soak. Manual dispatch uses the input.
          FC_NUM_RUNS: ${{ github.event.inputs.runs || '1000000' }}
        run: |
          deno test --allow-net --allow-env \
            extensions/models/stripe_mpp_property_test.ts \
            extensions/models/stripe_mpp_invariant_property_test.ts \
            extensions/models/stripe_mpp_flow_property_test.ts
