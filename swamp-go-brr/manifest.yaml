manifestVersion: 1
name: "@magistr/swamp-go-brr"
version: "2026.06.19.2"
description: |
  Autonomous merkle-DAG development loop, driver-free. Five models:
  - `gobrr` â€” a PURE DAG state machine: a Run aggregate over a dynamic Task DAG
    (implement | verify) with a scheduler (lease TTL/heartbeat/reap, concurrency
    gate, stall), dynamic follow-up expansion, a state machine, and run caps. It
    never touches the filesystem.
  - `source-integration` â€” the host code-ownership / allowlist-ACL actor:
    `build_workorder` (read the allowlist file slice into the leaf prompt, no-clone)
    and `apply` (parse the @@EDIT envelope, apply each task as a per-task
    base-isolated jj change behind a realpath-anchored allowlist ACL, return
    host-observed changedPaths + a secret-scrubbed diff).
  - `docker-verify` â€” the deterministic green gate: runs the host-pinned verify
    command to completion in a hardened, network-less, token-less container against
    the read-only applied tree and returns the raw exit code.
  - `preflight` â€” codebase-agnostic substrate setup: ensures the local OCI
    registry, digest-pins the codebase's OWN gate image (`pin_image` builds a
    build context or pins a prebuilt ref â€” the toolkit/deps live in that image,
    not here), and emits the run `config` (gate params, fabric_up inputs, the
    vault CEL for the OAuth token, and the si/dv/fab create commands). Shells to
    docker only.
  - `otlp-export` â€” the post-run OTLP egress actor (the loop's ONLY network push;
    gobrr stays pure): POSTs the derived `traceOtlp`/`metricsOtlp` to a configurable
    OTLP/HTTP collector (https), endpoint + token from a vault CEL, best-effort.
    gobrr's `emit_otlp` derives the OTLP span tree + per-leaf token/cost/time metrics;
    leaves run with `outputFormat=json` so claude's usage rides back.
  Each leaf runs `claude --print` in a Firecracker microVM via the @magistr/firecracker
  fabric (no-clone). The agent drives the loop inline (next -> build_workorder ->
  fabric.submit/poll -> apply -> docker-verify -> report); there is no driver script.
