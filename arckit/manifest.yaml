manifestVersion: 1
name: "@magistr/arckit"
version: "2026.07.16.2"
description: |
  Standalone swamp port of ArcKit (https://github.com/tractorjuice/arc-kit —
  the Enterprise Architecture Governance Harness): a skill-driven governance
  state machine with the full arc-kit template corpus bundled. No ArcKit
  Claude plugin and no Python CLI required.

  Model type `@magistr/arckit/workspace`:

  ## State machine (one governance project per state artifact)

  ```
  startProject -> foundation -> context -> risk -> business-case ->
  requirements -> design -> procurement -> design-review -> delivery ->
  operations -> assurance -> story -> complete   (abandon from any state)
  ```

  `advance` re-scans the disk and refuses unless every gate group of the
  current phase has an ARC-* artifact present; `skipPhase` records an
  explicit bypass of skippable phases. Profiles (standard | uk-gov | mod |
  ai) add gate groups (uk-gov: tcop + secure; mod: mod-secure; ai:
  data-model + ai-playbook + atrs). 000-global artifacts (e.g. principles)
  satisfy gates workspace-wide.

  ## Methods

  - startProject / status / advance / skipPhase / abandon — the lifecycle
  - template / templates / provisionTemplates — 65 bundled arc-kit v6.2.0
    templates, served with doc code, target ARC filename, and mandatory
    input artifacts
  - init / scan / gaps — workspace scaffold, full artifact inventory,
    mandatory-dependency violation report
  - migrateClassification — port of `arckit migrate-classification`
    (UK ladder → UAE Smart Data ladder, report-only by default)

  Ships the `arckit` skill that drives Claude through the loop: status →
  fetch template → read mandatory inputs → produce artifact → human
  approval → advance.

repository: "https://github.com/umag/swamp-workspace"
