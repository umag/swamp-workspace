manifestVersion: 1
name: "@magistr/bandcamp"
version: "2026.05.25.1"
description: |
  Bandcamp for swamp — search artists, albums, and tracks on the public
  catalog, and fetch full artist/album/track metadata (discography, track
  listings, tags, art) by URL.

  Model:
  - `@magistr/bandcamp` — `search-artist`, `search-album`, and `search-track`
    scrape the public Bandcamp search page; `get-artist`, `get-album`, and
    `get-track` parse JSON-LD plus embedded TralbumData from a Bandcamp URL.

  Optional OAuth (clientId/clientSecret) unlocks account methods: `my-bands`,
  `sales-report`, `get-merch-details`, `get-orders`, and `update-shipped`
  against the Bandcamp sales/merch API. The catalog search and detail methods
  need no credentials.

repository: "https://github.com/umag/swamp-workspace"
paths:
  base: manifest

models:
  - extensions/models/bandcamp.ts

additionalFiles:
  - README.md
  - LICENSE.md

platforms: []

labels:
  - music
  - bandcamp
  - media
