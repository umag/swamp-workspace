# promptfoo routing evals — source of truth is per-skill
# `.claude/skills/<name>/evals/trigger_evals.json`. CI expands those files
# into `promptfoo.generated.yaml` via `scripts/build-promptfoo-tests.ts`
# and runs promptfoo against the generated file.
#
# This file holds the provider + prompt template. The generator injects the
# `tests:` array.
#
# Pattern adapted from:
#   https://stack72.dev/skills-are-context-and-context-needs-tests/
#
# Limitation: this tests description-based routing via the raw Anthropic API,
# not the real Claude Code harness. A skill that passes here can still
# mis-route inside the harness — use as a PR gate, not a correctness proof.

description: "Skill routing evals — does the model pick the right skill?"

providers:
  - id: anthropic:messages:claude-sonnet-4-5
    config:
      max_tokens: 64
      temperature: 0

prompts:
  - id: routing
    raw: |
      You are a router choosing ONE Claude Code skill to handle a user query.

      Available skills (name — one-line purpose):
      - issue-lifecycle — drive an issue through triage, planning, review
        (incl. approving/rejecting the plan on review findings),
        implementation, knowledge harvest (record prior art, search UAT/KB),
        and completion via the @magistr/issue-lifecycle extension model
      - good-planning — convert an organization-level strategic choice into
        funded, synchronized, contingent, revisable commitments; audit plan
        governability via tripwires, signposts, and pullback ladders. NOT
        for OKR drafting, sprint scheduling, or approving/rejecting an issue
        or PR plan (that is issue-lifecycle)
      - ddd — domain-driven design: building-block selection, bounded
        contexts, aggregates, and ubiquitous-language guidance
      - tdd — test-first red-green-refactor workflow, plus unit vs
        integration test selection and test-file placement, for features
        and bug fixes
      - moldable-dev — build contextual micro tools, query live system
        state, create reusable reports to reduce time-to-answer
      - review-code — general code review for CLAUDE.md compliance, type
        safety, imports, and code organization (NOT domain modeling → ddd;
        NOT test-first workflow or test placement → tdd)
      - review-adversarial — adversarial review across 7 dimensions; assume
        code is broken
      - review-security — security audit (injection, secrets, supply chain,
        OWASP Top 10)
      - review-ux — CLI UX review (output formatting, help text, error
        messages, JSON mode, consistency)
      - review-skill — skill quality review (frontmatter, progressive
        disclosure, trigger precision, context window budget)
      - jscad-codegen — generate, validate, and render JSCAD v2 CAD scripts
        from natural language (text → STL/DXF/SVG/OBJ/3MF), fix JSCAD
        scripts, validate STL output

      User query: "{{query}}"

      Output ONLY the single skill name on one line (e.g. `review-code`),
      or `none` if no skill applies. No prose, no punctuation, no quotes.

# `tests` is injected by scripts/build-promptfoo-tests.ts at CI time.
tests: []
