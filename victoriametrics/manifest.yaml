manifestVersion: 1
name: "@magistr/victoriametrics"
version: "2026.05.25.1"
description: |
  VictoriaMetrics query API for swamp — instant/range PromQL, scrape-target
  health, a node-exporter system overview, and container memory rankings.

  Model:
  - `@magistr/victoriametrics` — queries a VictoriaMetrics (or Prometheus-
    compatible) HTTP endpoint via `/api/v1/query` and `/api/v1/query_range`.
    Methods: `query` (instant PromQL), `query-range` (range PromQL over a time
    window), `health` (scrape-target up/down from the `up` metric),
    `system-overview` (CPU/memory/load/disk/network stats plus anomaly
    detection from node-exporter), and `container-memory` (top-N container
    memory usage rankings).

repository: "https://github.com/umag/swamp-workspace"
paths:
  base: manifest

models:
  - extensions/models/victoriametrics.ts

additionalFiles:
  - README.md
  - LICENSE.md

platforms: []

labels:
  - metrics
  - observability
  - victoriametrics
  - prometheus
