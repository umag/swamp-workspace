manifestVersion: 1
name: "@magistr/headphones"
version: "2026.07.16.2"
description: |
  Headphones music-download automation API for swamp — manage artists, albums,
  and the wanted queue on a Headphones instance over its JSON API.

  Model:
  - `@magistr/headphones` — artist CRUD (find/add/get/pause/resume/refresh/del),
    album operations (find/add/get/queue/unqueue), list views (wanted, snatched,
    upcoming, history), and system actions (force-search, force-process,
    version/update checks, logs, restart, update).

  Includes an optional SSH-backed `audit-library` method that cross-checks the
  Headphones database (Status=Downloaded) against the music filesystem to report
  albums marked downloaded but absent from disk.

repository: "https://github.com/umag/swamp-workspace"
paths:
  base: manifest

models:
  - extensions/models/headphones.ts

additionalFiles:
  - README.md
  - LICENSE.md

platforms: []

labels:
  - music
  - automation
  - headphones
  - self-hosted
