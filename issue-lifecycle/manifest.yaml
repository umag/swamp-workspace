manifestVersion: 1
name: "@magistr/issue-lifecycle"
version: "2026.04.30.2"
description: |
  Issue lifecycle model with 9 bundled Claude Code skills for DDD, TDD,
  moldable development, and parallel code review.

  Drives issues from filing through triage, prior-art lookup, DDD + TDD
  planning, parallel review fan-out (5 review skills), autonomous
  code-review iteration (zero CRITICAL + zero HIGH gate), optional UAT/KB
  harvest, and completion. State persists across sessions via the `state`
  resource; the `hydrate` method writes a cheap `summary` resource for
  long autonomous loops.

  ## State Machine

  ```
  filed ‚îÄ‚îÄ[triage]‚îÄ‚îÄ> triaged
  triaged ‚îÄ‚îÄ[plan]‚îÄ‚îÄ> planned
  planned ‚îÄ‚îÄ[review_plan]‚îÄ‚îÄ> reviewing
  reviewing ‚îÄ‚îÄ[approve_plan]‚îÄ‚îÄ> approved
  reviewing ‚îÄ‚îÄ[reject_plan]‚îÄ‚îÄ> planned  (feedback loop)
  approved ‚îÄ‚îÄ[implement]‚îÄ‚îÄ> implementing
  implementing ‚îÄ‚îÄ[review_code]‚îÄ‚îÄ> code_reviewing
  code_reviewing ‚îÄ‚îÄ[resolve_findings]‚îÄ‚îÄ> resolved
  code_reviewing ‚îÄ‚îÄ[iterate]‚îÄ‚îÄ> implementing  (autonomous loop)
  resolved ‚îÄ‚îÄ[iterate]‚îÄ‚îÄ> implementing
  resolved ‚îÄ‚îÄ[harvest]‚îÄ‚îÄ> harvested  (optional)
  resolved ‚îÄ‚îÄ[complete]‚îÄ‚îÄ> complete
  harvested ‚îÄ‚îÄ[complete]‚îÄ‚îÄ> complete
  ```

  `approve_plan` requires full matrix coverage AND zero open CRITICAL AND
  zero open HIGH findings. `close` works from any state.

  ## Methods

  - `start` ‚Äî file a new issue
  - `triage` ‚Äî classify with optional confidence/regression/reproduction
  - `record_prior_art` ‚Äî record existing UAT scenarios and KB entries
  - `plan` ‚Äî create/revise plan with DDD analysis, TDD strategy, review matrix
  - `review_plan` ‚Äî enter plan review phase
  - `record_review` ‚Äî record one reviewer's findings
  - `approve_plan` ‚Äî approve (gated on coverage + zero blocking findings)
  - `reject_plan` ‚Äî reject with auto/human source tracking
  - `implement` ‚Äî start coding on a branch
  - `review_code` ‚Äî enter code review phase
  - `resolve_findings` ‚Äî record resolutions, snapshot round
  - `iterate` ‚Äî return to implementation (bumps codeReviewIteration)
  - `harvest` ‚Äî record UAT/KB improvement proposals
  - `complete` ‚Äî mark done
  - `close` ‚Äî abandon from any state
  - `hydrate` ‚Äî write compact summary for autonomous loops

  ## Bundled Skills

  - `issue-lifecycle` ‚Äî orchestrates the full lifecycle
  - `ddd` ‚Äî domain-driven design building block selection
  - `tdd` ‚Äî red-green-refactor workflow enforcement
  - `moldable-dev` ‚Äî contextual inspectors and live-data queries
  - `review-code` ‚Äî general code review
  - `review-adversarial` ‚Äî adversarial review (7 dimensions)
  - `review-security` ‚Äî OWASP-adapted security audit
  - `review-ux` ‚Äî CLI output and error message review
  - `review-skill` ‚Äî skill quality review

